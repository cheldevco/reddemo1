<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RedDemo Admin Panel</title>
    <style>
        /* Темно-красный геймерский стиль админки */
        body { 
            background: #0b0c10; 
            color: #ffffff; 
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        .admin-box { 
            background: #1f1114; 
            border: 1px solid #8b0000; 
            padding: 40px; 
            border-radius: 10px; 
            width: 100%;
            max-width: 480px; 
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.3); 
        }
        h1 { margin-top: 0; font-size: 26px; text-align: center; letter-spacing: 1px; }
        h1 span { color: #ff2a2a; text-shadow: 0 0 10px #ff2a2a; }
        h3 { color: #888; font-weight: normal; margin-bottom: 25px; text-align: center; font-size: 15px; }
        label { font-size: 12px; color: #ff2a2a; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; }
        input { 
            width: 100%; 
            padding: 12px; 
            margin: 6px 0 18px 0; 
            box-sizing: border-box; 
            background: #120709; 
            border: 1px solid #4a0000; 
            color: white; 
            border-radius: 5px; 
            font-size: 14px;
            transition: 0.3s;
        }
        input:focus {
            border-color: #ff2a2a;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 42, 42, 0.2);
        }
        button { 
            width: 100%; 
            background: #ff2a2a; 
            color: white; 
            border: none; 
            padding: 14px; 
            font-weight: bold; 
            font-size: 15px;
            border-radius: 5px; 
            cursor: pointer; 
            transition: 0.2s; 
            letter-spacing: 1px;
            margin-top: 10px;
        }
        button:hover { 
            background: #b30000; 
            box-shadow: 0 0 15px #ff2a2a; 
        }
        #status { 
            text-align: center; 
            margin-top: 20px; 
            font-weight: bold; 
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="admin-box">
        <h1>RED<span>DEMO</span> ADMIN</h1>
        <h3>Панель управления игровым каталогом</h3>
        
        <label>Доступ</label>
        <input type="password" id="admin-pass" placeholder="Введите секретный пароль админа">
        
        <hr style="border: 0; border-top: 1px solid #4a0000; margin: 25px 0;">
        
        <label>Название игры</label>
        <input type="text" id="game-title" placeholder="Например: GTA V (Ultra-Lite)">
        
        <label>Цена репака (в рублях)</label>
        <input type="number" id="game-price" placeholder="0 — если бесплатно">
        
        <label>Ссылка на скачивание архива</label>
        <input type="text" id="game-url" placeholder="Прямая ссылка на ZIP в твоем облаке">
        
        <label>Путь к exe-файлу запуска</label>
        <input type="text" id="game-exe" placeholder="Например: gta5.exe">
        
        <label>Ссылка на обложку игры</label>
        <input type="text" id="game-cover" placeholder="URL картинки-постера для витрины">
        
        <button onclick="addGame()">ОПУБЛИКОВАТЬ ИГРУ</button>
        
        <p id="status"></p>
    </div>

    <script>
        async function addGame() {
            const status = document.getElementById('status');
            status.innerText = "Отправка данных...";
            status.style.color = "#888";

            try {
                // Шлем POST запрос на наш локальный Node.js сервер
                const response = await fetch('http://localhost:3000/api/admin/add-game', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        password: document.getElementById('admin-pass').value,
                        title: document.getElementById('game-title').value,
                        price_rub: document.getElementById('game-price').value,
                        download_url: document.getElementById('game-url').value,
                        exe_path: document.getElementById('game-exe').value,
                        cover_url: document.getElementById('game-cover').value
                    })
                });

                const result = await response.json();
                
                if (response.ok && result.success) {
                    status.style.color = '#00ff00';
                    status.innerText = "🚀 Игра успешно залетела в базу данных Supabase!";
                    
                    // Очищаем поля формы, кроме пароля
                    document.getElementById('game-title').value = "";
                    document.getElementById('game-price').value = "";
                    document.getElementById('game-url').value = "";
                    document.getElementById('game-exe').value = "";
                    document.getElementById('game-cover').value = "";
                } else {
                    status.style.color = '#ff0000';
                    status.innerText = "❌ Ошибка: " + (result.error || "Неизвестная ошибка");
                }
            } catch (err) {
                status.style.color = '#ff0000';
                status.innerText = "❌ Ошибка сети: Убедись, что бэкенд (node index.js) запущен!";
            }
        }
    </script>
</body>
</html>
