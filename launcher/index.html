<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>RedDemo Launcher</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Заглушка авторизации -->
    <div id="auth-screen" class="screen">
        <div class="auth-box">
            <div class="logo">RED<span>DEMO</span></div>
            <h2>Создать аккаунт</h2>
            <input type="text" id="reg-username" placeholder="Имя пользователя">
            <select id="reg-currency">
                <option value="RUB">Российский рубль (₽)</option>
                <option value="USD">Доллар США ($)</option>
                <option value="KZT">Казахстанский тенге (₸)</option>
            </select>
            <button id="btn-register">Зайти в Стим</button>
        </div>
    </div>

    <!-- Главный экран программы -->
    <div id="main-screen" class="screen hidden">
        <div class="sidebar">
            <div class="logo">RED<span>DEMO</span></div>
            <div class="menu">
                <a href="#" class="active">漏 Магазин</a>
                <a href="#">👥 Друзья (0)</a>
            </div>
            <div class="balance-box">
                <p>Ваш баланс:</p>
                <div id="user-balance" class="price">0.00 ↽</div>
                <div id="user-name" style="color: #888; font-size: 14px; margin-top: 5px;">User</div>
            </div>
        </div>

        <div class="main-content">
            <h1>Каталог оптимизированных игр</h1>
            <div class="games-grid">
                <!-- Карточка GTA V -->
                <div class="game-card">
                    <div class="game-cover" style="background-image: url('https://unsplash.com');"></div>
                    <div class="game-info">
                        <h3>GTA V (Ultra-Lite)</h3>
                        <p class="game-size">Размер: 2.5 ГБ</p>
                        <button class="btn-action" id="btn-gta" onclick="handleGta()">Скачать</button>
                        <div class="progress-bar hidden" id="gta-progress-box">
                            <div class="progress-fill" id="gta-fill" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
