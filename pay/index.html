<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Пополнение баланса RedDemo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#1a0f0f] text-white flex items-center justify-center min-h-screen">
    <div class="bg-[#2b1616] p-8 rounded-lg shadow-xl w-full max-w-md border border-[#421f1f]">
        <h1 class="text-2xl font-bold text-center text-[#ff4d4d] mb-6">ПОПОЛНЕНИЕ БАЛАНСА</h1>
        
        <div class="mb-4">
            <label class="block text-sm text-gray-400 mb-2">Ваш Email в лаунчере</label>
            <input id="email" type="email" placeholder="example@mail.com" class="w-full p-3 rounded bg-[#421f1f] border border-[#802b2b] text-white focus:outline-none focus:border-[#ff4d4d]">
        </div>

        <div class="mb-6">
            <label class="block text-sm text-gray-400 mb-2">Сумма пополнения (RUB)</label>
            <input id="amount" type="number" placeholder="500" class="w-full p-3 rounded bg-[#421f1f] border border-[#802b2b] text-white focus:outline-none focus:border-[#ff4d4d]">
        </div>

        <button onclick="topUpBalance()" class="w-full bg-[#992222] hover:bg-[#cc3333] text-white font-bold py-3 px-4 rounded transition duration-200">
            Оплатить баланс
        </button>

        <p id="status" class="text-center mt-4 font-semibold"></p>
    </div>

    <script>
        const SUPABASE_URL = "https://bayqqmzeulrlrxavnbhh.supabase.co";
        const SUPABASE_KEY = "sb_publishable_8XiZLsKl6Zs87BAyhCaUJw_E1fmp8S1";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function topUpBalance() {
            const emailInput = document.getElementById('email').value.trim().toLowerCase();
            const amountInput = parseFloat(document.getElementById('amount').value);
            const status = document.getElementById('status');

            if(!emailInput || isNaN(amountInput) || amountInput <= 0) {
                status.innerText = "Заполните поля корректно!";
                status.className = "text-center mt-4 text-red-400";
                return;
            }

            status.innerText = "Проверка аккаунта в базе данных...";
            status.className = "text-center mt-4 text-yellow-400";

            try {
                // 1. Ищем профиль пользователя по его Email
                const { data: profile, error: findError } = await supabaseClient
                    .from('profiles')
                    .select('*')
                    .eq('email', emailInput)
                    .maybeSingle();

                if (findError || !profile) {
                    status.innerText = "Пользователь с таким Email не найден!";
                    status.className = "text-center mt-4 text-red-400";
                    return;
                }

                // 2. Рассчитываем новый баланс
                const currentBalance = parseFloat(profile.balance || 0);
                const newBalance = currentBalance + amountInput;

                // 3. Отправляем обновление баланса обратно в базу
                const { error: updateError } = await supabaseClient
                    .from('profiles')
                    .update({ balance: newBalance })
                    .eq('id', profile.id);

                if (updateError) {
                    status.innerText = "Ошибка при обновлении баланса в базе.";
                    status.className = "text-center mt-4 text-red-400";
                } else {
                    status.innerText = `🔥 Успешно зачислено! Текущий баланс: ${newBalance} руб.`;
                    status.className = "text-center mt-4 text-green-400";
                    document.getElementById('amount').value = "";
                }

            } catch(e) {
                console.error(e);
                status.innerText = "Произошла критическая ошибка сети.";
                status.className = "text-center mt-4 text-red-400";
            }
        }
    </script>
</body>
</html>
